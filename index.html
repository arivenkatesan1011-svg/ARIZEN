<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARIZEN DEV</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

/* youtube background */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.video-bg iframe{
position:absolute;
top:50%;
left:50%;
width:177.77vh;
height:100vh;
transform:translate(-50%,-50%);
pointer-events:none;
}

/* profile card */

.card{
text-align:center;
background:rgba(0,0,0,0.45);
padding:30px;
border-radius:18px;
backdrop-filter:blur(10px);
}

.card img{
width:160px;
height:160px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
box-shadow:0 0 35px rgba(255,255,255,0.5);
}

.card h1{
margin-top:18px;
letter-spacing:4px;
font-size:22px;
}

/* music button */

.music-btn{
position:fixed;
top:20px;
right:20px;
padding:10px 18px;
border:none;
border-radius:6px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

/* mobile */

@media (max-width:600px){

.card{
padding:20px;
}

.card img{
width:130px;
height:130px;
}

.card h1{
font-size:18px;
}

.music-btn{
top:15px;
right:15px;
padding:8px 14px;
}

}

</style>

</head>

<body>

<button class="music-btn" onclick="toggleMusic()">🎵 MUSIC</button>

<div class="card">

<img src="https://files.catbox.moe/tsd9ie.gif">

<h1>ARIZEN DEV</h1>

</div>

<div class="video-bg">

<iframe id="player"
src="https://www.youtube.com/embed/DrlaVYKWeLU?controls=0&showinfo=0&rel=0&modestbranding=1&loop=1&playlist=DrlaVYKWeLU&mute=1"
frameborder="0"
allow="autoplay">
</iframe>

</div>

<script>

let playing=false;

function toggleMusic(){

let p=document.getElementById("player");

if(!playing){

p.src="https://www.youtube.com/embed/DrlaVYKWeLU?autoplay=1&controls=0&showinfo=0&rel=0&modestbranding=1&loop=1&playlist=DrlaVYKWeLU";

playing=true;

}else{

p.src="https://www.youtube.com/embed/DrlaVYKWeLU?controls=0&loop=1&playlist=DrlaVYKWeLU&mute=1";

playing=false;

}

}

</script>

</body>
</html>
