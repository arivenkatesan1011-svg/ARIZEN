<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARIZEN DEV</title>

<style>

body{
margin:0;
padding:0;
height:100vh;
font-family:Arial;
overflow:hidden;
color:white;
display:flex;
justify-content:center;
align-items:center;
}

/* YouTube background */

#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}

#bg-video iframe{
width:100vw;
height:100vh;
}

/* profile card */

.card{
text-align:center;
backdrop-filter:blur(6px);
padding:30px;
border-radius:15px;
background:rgba(0,0,0,0.4);
}

img{
width:220px;
height:220px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
box-shadow:0 0 40px rgba(255,255,255,0.6);
}

h1{
margin-top:20px;
letter-spacing:4px;
}

/* music button */

.music-btn{
position:fixed;
top:20px;
right:20px;
padding:12px 20px;
background:white;
color:black;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<button class="music-btn" onclick="toggleMusic()">🎵 MUSIC</button>

<div class="card">

<img src="https://files.catbox.moe/tsd9ie.gif">

<h1>ARIZEN DEV</h1>

</div>

<div id="bg-video">

<iframe id="ytplayer"
src="https://www.youtube.com/embed/DrlaVYKWeLU?controls=0&loop=1&playlist=DrlaVYKWeLU&mute=1"
frameborder="0"
allow="autoplay">
</iframe>

</div>

<script>

let playing = false;

function toggleMusic(){

let player = document.getElementById("ytplayer");

if(!playing){

player.src="https://www.youtube.com/embed/DrlaVYKWeLU?autoplay=1&controls=0&loop=1&playlist=DrlaVYKWeLU";

playing=true;

}else{

player.src="https://www.youtube.com/embed/DrlaVYKWeLU?controls=0&loop=1&playlist=DrlaVYKWeLU&mute=1";

playing=false;

}

}

</script>

</body>
</html>
