<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARIZEN DEV</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

/* background video */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
overflow:hidden;
z-index:-1;
}

.video-bg iframe{
position:absolute;
top:-120px;
left:0;
width:100%;
height:calc(100% + 240px);
pointer-events:none;
}

/* profile card */

.card{
text-align:center;
background:rgba(0,0,0,0.45);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
}

.card img{
width:160px;
height:160px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
}

.card h1{
margin-top:18px;
letter-spacing:4px;
}

/* music button */

.music-btn{
position:fixed;
top:20px;
right:20px;
padding:10px 18px;
border:none;
border-radius:6px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<button class="music-btn" onclick="toggleMusic()">🎵 MUSIC</button>

<div class="card">

<img src="https://files.catbox.moe/tsd9ie.gif">

<h1>ARIZEN DEV</h1>

</div>

<!-- Background Video -->

<div class="video-bg">

<iframe
src="https://www.youtube.com/embed/wOzQMCyPc8o?autoplay=1&mute=1&controls=0&loop=1&playlist=wOzQMCyPc8o&rel=0&modestbranding=1"
frameborder="0"
allow="autoplay">
</iframe>

</div>

<!-- Hidden Music Player -->

<iframe id="music"
width="0"
height="0"
src=""
frameborder="0"
allow="autoplay">
</iframe>

<script>

let playing=false;

function toggleMusic(){

let m=document.getElementById("music");

if(!playing){

m.src="https://www.youtube.com/embed/DrlaVYKWeLU?autoplay=1&loop=1&playlist=DrlaVYKWeLU";

playing=true;

}else{

m.src="";

playing=false;

}

}

</script>

</body>
</html>
