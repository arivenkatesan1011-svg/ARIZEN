<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ARIZEN DEV</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

/* background video */

.video-bg video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* profile card */

.card{
text-align:center;
background:rgba(0,0,0,0.45);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
}

.card img{
width:170px;
height:170px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
box-shadow:0 0 30px rgba(255,255,255,0.6);
}

.card h1{
margin-top:18px;
letter-spacing:4px;
}

/* music button */

.music-btn{
position:fixed;
top:20px;
right:20px;
padding:10px 18px;
border:none;
border-radius:6px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<button class="music-btn" onclick="toggleMusic()">🎵 MUSIC</button>

<div class="card">

<img src="https://files.catbox.moe/tsd9ie.gif">

<h1>ARIZEN DEV</h1>

</div>

<div class="video-bg">

<video autoplay muted loop>
<source src="background.mp4" type="video/mp4">
</video>

</div>

<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>

let playing=false;
let music=document.getElementById("music");

function toggleMusic(){

if(!playing){
music.play();
playing=true;
}else{
music.pause();
playing=false;
}

}

</script>

</body>
</html>
